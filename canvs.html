<!DOCTYPE html>
<html lang="id" data-bs-theme="dark">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sabak — Papan Tulis</title>

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='10' fill='%23222'/%3E%3Crect x='6' y='8' width='52' height='36' rx='4' fill='%23111' stroke='%23555' stroke-width='2'/%3E%3Cpath d='M14 36 Q22 18 30 28 Q38 38 46 16' stroke='%23fff' stroke-width='3' fill='none' stroke-linecap='round' stroke-linejoin='round'/%3E%3Crect x='20' y='48' width='24' height='6' rx='2' fill='%23888'/%3E%3Crect x='29' y='44' width='6' height='5' rx='1' fill='%23888'/%3E%3C/svg%3E" />

    <!-- Bootstrap 5 -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />

    <link rel="stylesheet" href="canvs.css" />
</head>

<body class="bg-dark text-light min-vh-100 d-flex flex-column">

    <!-- ── Navbar ─────────────────────────────────────────────── -->
    <nav class="navbar navbar-dark bg-black border-bottom border-secondary px-3 py-2">
        <span class="navbar-brand d-flex align-items-center gap-2 mb-0">
            <svg width="28" height="28" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                <rect width="64" height="64" rx="10" fill="#222"/>
                <rect x="6" y="8" width="52" height="36" rx="4" fill="#111" stroke="#555" stroke-width="2"/>
                <path d="M14 36 Q22 18 30 28 Q38 38 46 16" stroke="#fff" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
                <rect x="20" y="48" width="24" height="6" rx="2" fill="#888"/>
                <rect x="29" y="44" width="6" height="5" rx="1" fill="#888"/>
            </svg>
            <span class="fw-semibold fs-5">Sabak</span>
        </span>
        <div class="d-flex align-items-center gap-2 ms-auto">
            <span class="badge bg-secondary font-monospace" id="sbk_ordinat">X: 0  Y: 0</span>
            <span class="badge" id="badge_drawing">Tidak Melukis</span>
            <span class="badge" id="badge_record">Tidak Merekam</span>
        </div>
    </nav>

    <!-- ── Main ───────────────────────────────────────────────── -->
    <main class="flex-grow-1 container-fluid px-3 py-3">

        <!-- Canvas -->
        <div class="canvas-wrapper rounded-3 overflow-hidden mb-3 shadow">
            <canvas id="sabak" width="1200" height="600"></canvas>
        </div>

        <!-- Toolbar -->
        <div class="toolbar d-flex flex-wrap align-items-center gap-2">

            <!-- Colours -->
            <div class="d-flex align-items-center gap-1" id="sbk_color"
                 role="group" aria-label="Pilih warna">
                <button class="color-swatch" data-clr="#ffffff" title="Putih"></button>
                <button class="color-swatch" data-clr="#facc15" title="Kuning"></button>
                <button class="color-swatch" data-clr="#f472b6" title="Pink"></button>
                <button class="color-swatch" data-clr="#4ade80" title="Hijau"></button>
                <button class="color-swatch" data-clr="#38bdf8" title="Biru"></button>
                <button class="color-swatch" data-clr="#f87171" title="Merah"></button>
            </div>

            <div class="vr opacity-25"></div>

            <!-- Line width -->
            <div class="d-flex align-items-center gap-2" title="Ketebalan garis">
                <i class="bi bi-pencil text-secondary small"></i>
                <input type="range" class="form-range" id="line_width"
                       min="1" max="30" value="2" style="width:90px" />
                <span class="text-secondary font-monospace small"
                      id="line_width_val" style="min-width:28px">2px</span>
            </div>

            <div class="vr opacity-25"></div>

            <!-- Drawing tools -->
            <div class="d-flex align-items-center gap-1"
                 role="group" aria-label="Alat gambar">
                <button class="btn btn-sm btn-outline-light tool-btn active"
                        data-tool="pen" title="Pena (P)">
                    <i class="bi bi-pen"></i>
                </button>
                <button class="btn btn-sm btn-outline-light tool-btn"
                        data-tool="eraser" title="Penghapus (E)">
                    <i class="bi bi-eraser"></i>
                </button>
                <button class="btn btn-sm btn-outline-light tool-btn"
                        data-tool="line" title="Garis">
                    <i class="bi bi-slash-lg"></i>
                </button>
                <button class="btn btn-sm btn-outline-light tool-btn"
                        data-tool="rect" title="Persegi">
                    <i class="bi bi-square"></i>
                </button>
                <button class="btn btn-sm btn-outline-light tool-btn"
                        data-tool="circle" title="Lingkaran">
                    <i class="bi bi-circle"></i>
                </button>
                <button class="btn btn-sm btn-outline-light tool-btn"
                        data-tool="text" title="Teks">
                    <i class="bi bi-fonts"></i>
                </button>
            </div>

            <div class="vr opacity-25"></div>

            <!-- Actions -->
            <button class="btn btn-sm btn-outline-secondary"
                    onclick="history.go(0)" title="Undo (Ctrl+Z)"
                    id="btn_undo"
                    style="display:none">
                <!-- hidden; Ctrl+Z is the primary UX, button is optional -->
            </button>
            <button class="btn btn-sm btn-outline-danger"
                    onclick="sbk_reset()" title="Bersihkan kanvas">
                <i class="bi bi-trash3"></i> Bersihkan
            </button>

            <div class="vr opacity-25"></div>

            <!-- Recording -->
            <button class="btn btn-sm btn-outline-success"
                    onclick="sabak_record_start()" title="Mulai rekam">
                <i class="bi bi-record-circle"></i> Rekam
            </button>
            <button class="btn btn-sm btn-outline-warning"
                    onclick="sabak_record_stop()" title="Berhenti rekam">
                <i class="bi bi-stop-circle"></i> Berhenti
            </button>
            <button class="btn btn-sm btn-outline-info"
                    onclick="sabak_playr()" title="Putar rekaman">
                <i class="bi bi-play-circle"></i> Putar
            </button>

        </div><!-- /toolbar -->

        <!-- Keyboard hint -->
        <p class="text-secondary small mt-2 mb-0">
            <kbd>Ctrl</kbd>+<kbd>Z</kbd> untuk undo &nbsp;·&nbsp;
            Klik kanvas dengan alat <i class="bi bi-fonts"></i> untuk menambah teks
        </p>

        <!-- Playback preview -->
        <div id="playback_wrap" class="mt-3 d-none">
            <p class="text-secondary small mb-1">Hasil Rekaman</p>
            <img src="" id="frm" alt="Rekaman akan muncul di sini"
                 class="rounded-2 border border-secondary" />
        </div>

    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="canvs.js"></script>
</body>

</html>
